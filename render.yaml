services:
  # ── Backend: Flask API ────────────────────────────────────────────────────────
  - type: web
    name: thermo-twin-backend
    runtime: python
    rootDir: .
    buildCommand: pip install -r render-requirements.txt
    startCommand: python backend/app.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PORT
        value: "5000"
    healthCheckPath: /health

  # ── Frontend: Vite/React Static Site ─────────────────────────────────────────
  - type: web
    name: thermo-twin-frontend
    runtime: static
    rootDir: thermo-twin-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://thermo-twin-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
