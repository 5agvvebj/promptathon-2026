version: "3.9"

services:

  influxdb:
    image: influxdb:2.7
    container_name: thermo-twin-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE:        setup
      DOCKER_INFLUXDB_INIT_USERNAME:    admin
      DOCKER_INFLUXDB_INIT_PASSWORD:    thermo-twin-pass
      DOCKER_INFLUXDB_INIT_ORG:         thermo-twin
      DOCKER_INFLUXDB_INIT_BUCKET:      hvac_data
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: thermo-twin-dev-token
    volumes:
      - influxdb_data:/var/lib/influxdb2

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: thermo-twin-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

volumes:
  influxdb_data:
